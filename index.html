<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提詞庫 Prompt Library</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:20px;}
.container{max-width:1280px;margin:0 auto;}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
h1{font-size:22px;color:#f1f5f9;display:flex;align-items:center;gap:8px;}
.mode-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:normal;}
.mode-badge.read{background:#334155;color:#94a3b8;}
.mode-badge.edit{background:#10b981;color:#fff;}
.sync{font-size:12px;color:#94a3b8;}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* Main tabs */
.main-tabs{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.main-tab{padding:8px 16px;background:#1e293b;border:1px solid #334155;border-radius:8px;cursor:pointer;color:#cbd5e1;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;}
.main-tab:hover{background:#334155;}
.main-tab.active{background:#3b82f6;border-color:#3b82f6;color:#fff;}
.tab-add-btn{padding:7px 12px;background:transparent;border:1px dashed #475569;border-radius:8px;cursor:pointer;color:#64748b;font-size:13px;transition:all .15s;}
.tab-add-btn:hover{border-color:#94a3b8;color:#94a3b8;}

/* Sub tabs */
.sub-tabs-wrap{min-height:40px;margin-bottom:16px;}
.sub-tabs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sub-tab{padding:5px 12px;background:#0f172a;border:1px solid #334155;border-radius:6px;cursor:pointer;color:#94a3b8;font-size:12px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.sub-tab:hover{background:#1e293b;color:#cbd5e1;}
.sub-tab.active{border-color:transparent;color:#fff;}
.sub-tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sub-add-btn{padding:4px 10px;background:transparent;border:1px dashed #334155;border-radius:6px;cursor:pointer;color:#475569;font-size:12px;transition:all .15s;}
.sub-add-btn:hover{border-color:#64748b;color:#64748b;}

/* Toolbar */
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
input,textarea,select{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;font-family:inherit;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#3b82f6;}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap input{width:100%;padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#64748b;pointer-events:none;}
.stats{font-size:12px;color:#64748b;white-space:nowrap;}

/* Buttons */
button{background:#3b82f6;border:none;border-radius:8px;padding:10px 16px;color:#fff;cursor:pointer;font-size:14px;font-weight:500;transition:background .15s;display:inline-flex;align-items:center;gap:6px;}
button:hover{background:#2563eb;}
button.ghost{background:#334155;color:#e2e8f0;}
button.ghost:hover{background:#475569;}
button.danger{background:#ef4444;}
button.danger:hover{background:#dc2626;}
button.sm{padding:5px 10px;font-size:12px;}
button.icon-btn{background:transparent;border:1px solid #334155;padding:8px 10px;color:#94a3b8;}
button.icon-btn:hover{background:#334155;color:#e2e8f0;}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s;}
.card:hover{border-color:#475569;}
.card-thumb{width:100%;height:165px;background:#0f172a;object-fit:cover;display:block;}
.card-thumb.ph{display:flex;align-items:center;justify-content:center;font-size:42px;color:#334155;}

/* Image uploader */
.img-upload-area{width:100%;height:160px;background:#0f172a;border:2px dashed #334155;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.img-upload-area:hover{border-color:#3b82f6;background:#1e293b;}
.img-upload-area.drag{border-color:#3b82f6;background:#1e3a5f;}
.img-upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:6px;}
.img-upload-area .overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;gap:8px;border-radius:6px;flex-direction:column;}
.img-upload-area:hover .overlay{display:flex;}
.img-upload-hint{font-size:12px;color:#64748b;text-align:center;line-height:1.6;}
.img-upload-icon{font-size:28px;}
.img-actions{display:flex;gap:6px;margin-top:6px;}
.img-uploading{font-size:12px;color:#60a5fa;}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:7px;}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.badge-main{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#fff;}
.badge-sub{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;color:#fff;opacity:.85;}
.fav-icon{color:#f59e0b;font-size:13px;}
.card-title{font-size:15px;font-weight:600;color:#f1f5f9;line-height:1.3;}
.prompt-box{background:#0f172a;padding:7px 8px;border-radius:6px;font-size:12px;max-height:54px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;line-height:1.5;}
.pzh{color:#cbd5e1;} .pen{color:#7dd3fc;}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{background:#0f172a;color:#94a3b8;padding:2px 7px;border-radius:4px;font-size:11px;}
.card-meta{font-size:11px;color:#475569;}
.card-actions{display:flex;gap:5px;margin-top:auto;flex-wrap:wrap;}
.empty{text-align:center;padding:80px 20px;color:#475569;}
.empty-icon{font-size:56px;margin-bottom:12px;}

/* Modal */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;padding:16px;z-index:100;}
.backdrop.open{display:flex;}
.modal{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:24px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;}
.modal.sm{max-width:400px;}
.modal h2{margin-bottom:18px;font-size:17px;}
.fg{margin-bottom:14px;}
.fg label{display:block;margin-bottom:5px;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;}
.fg input,.fg textarea,.fg select{width:100%;}
.fg textarea{min-height:76px;resize:vertical;font-family:inherit;line-height:1.5;}
.frow{display:flex;gap:10px;}
.frow .fg{flex:1;}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
.help{font-size:12px;color:#64748b;margin-top:5px;line-height:1.5;}
.help a{color:#60a5fa;}

/* Color picker */
.colors{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px;}
.col-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .1s;}
.col-dot.sel{border-color:#fff;}

/* Cat tree */
.cat-tree{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;}
.cat-node{background:#0f172a;border:1px solid #334155;border-radius:10px;overflow:hidden;}
.cat-node-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;}
.cat-node-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cat-node-name{flex:1;font-size:14px;font-weight:600;}
.cat-node-actions{display:flex;gap:5px;}
.subs-list{padding:0 12px 10px 24px;display:flex;flex-direction:column;gap:6px;}
.sub-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#1e293b;border-radius:7px;}
.sub-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sub-item-name{flex:1;font-size:13px;}
.sub-item-actions{display:flex;gap:4px;}
.add-sub-row{padding:4px 12px 10px 24px;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.err{background:#ef4444;}

.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.eo{display:none!important;}
body.editmode .eo{display:inline-flex!important;}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎬 提詞庫 <span class="mode-badge read" id="modeBadge">👁️ 唯讀</span></h1>
    <div class="header-right">
      <span class="sync" id="syncEl"></span>
      <button class="eo" id="btnAdd">＋ 新增提詞</button>
      <button class="ghost eo" id="btnExport">匯出</button>
      <button class="icon-btn" id="btnSettings">⚙️</button>
    </div>
  </header>

  <!-- 主分類 tabs -->
  <div class="main-tabs" id="mainTabs">
    <div class="main-tab active" data-main="all">全部</div>
    <div class="main-tab" data-main="fav">⭐ 收藏</div>
    <!-- dynamic -->
    <div class="tab-add-btn eo" id="btnAddMain">＋ 新增大主題</div>
  </div>

  <!-- 小分類 tabs -->
  <div class="sub-tabs-wrap" id="subTabsWrap" style="display:none">
    <div class="sub-tabs" id="subTabs"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" placeholder="搜尋標題、Prompt、標籤…">
    </div>
    <select id="sortBy">
      <option value="updated">最近更新</option>
      <option value="created">建立時間</option>
      <option value="title">標題 A-Z</option>
    </select>
    <span class="stats" id="statsEl"></span>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyEl" style="display:none">
    <div class="empty-icon">📭</div>
    <div>沒有符合的提詞</div>
  </div>
</div>

<!-- ========== 提詞 Modal ========== -->
<div class="backdrop" id="promptBD">
  <div class="modal">
    <h2 id="promptTitle">新增提詞</h2>
    <form id="promptForm">
      <div class="frow">
        <div class="fg">
          <label>大主題</label>
          <select id="mainSel" name="catId" required></select>
        </div>
        <div class="fg">
          <label>小主題</label>
          <select id="subSel" name="subId"></select>
        </div>
      </div>
      <div class="fg"><label>標題</label><input name="title" required placeholder="例：電影感日落街景"></div>
      <div class="fg">
        <label>縮圖圖片</label>
        <div class="img-upload-area" id="imgUploadArea">
          <div class="img-upload-icon">🖼️</div>
          <div class="img-upload-hint">點擊上傳 / 拖曳圖片 / Ctrl+V 貼截圖</div>
          <div class="overlay">
            <span style="color:#fff;font-size:13px;">🔄 更換圖片</span>
            <button type="button" class="sm danger" id="btnRemoveImg" onclick="event.stopPropagation();removeImg()">✕ 移除</button>
          </div>
        </div>
        <div class="img-actions">
          <span class="img-uploading" id="imgUploadStatus" style="display:none">⏳ 上傳中…</span>
        </div>
        <input type="hidden" name="thumbnail" id="thumbnailInput">
        <div class="help">或貼上網址：<input id="thumbUrlInput" placeholder="https://..." style="margin-top:4px;font-size:12px;padding:6px 8px;width:100%"></div>
      </div>
      <div class="fg"><label>中文 Prompt</label><textarea name="promptZh" placeholder="用中文描述你想要的畫面"></textarea></div>
      <div class="fg"><label>英文 Prompt（給 API）</label><textarea name="promptEn" placeholder="English prompt for API"></textarea></div>
      <div class="fg"><label>標籤（逗號分隔）</label><input name="tags" placeholder="電影感, 夕陽, 街景"></div>
      <div class="fg"><label>備註 / 參數</label><textarea name="notes" placeholder="ratio 16:9, duration 5s…"></textarea></div>
      <div class="fg"><label><input type="checkbox" name="fav" style="width:auto;margin-right:6px">加入收藏</label></div>
      <div class="modal-foot">
        <button type="button" class="ghost" id="btnPromptCancel">取消</button>
        <button type="submit">儲存</button>
      </div>
    </form>
  </div>
</div>

<!-- ========== 分類 Modal（新增/編輯大or小）========== -->
<div class="backdrop" id="catBD">
  <div class="modal sm">
    <h2 id="catTitle">新增大主題</h2>
    <form id="catForm">
      <div class="fg"><label>名稱</label><input name="name" required placeholder="例：影片、Seedance 2.0"></div>
      <div class="frow">
        <div class="fg"><label>圖示 Emoji</label><input name="icon" placeholder="🎞️" maxlength="4" style="font-size:18px"></div>
      </div>
      <div class="fg">
        <label>顏色</label>
        <div class="colors" id="colorPicker"></div>
      </div>
      <div class="modal-foot">
        <button type="button" class="ghost" id="btnCatCancel">取消</button>
        <button type="submit">儲存</button>
      </div>
    </form>
  </div>
</div>

<!-- ========== 管理分類 Modal ========== -->
<div class="backdrop" id="mgrBD">
  <div class="modal">
    <h2>📂 管理分類</h2>
    <div class="cat-tree" id="catTree"></div>
    <div class="modal-foot">
      <button class="ghost" id="btnMgrClose">關閉</button>
      <button class="eo" id="btnMgrAddMain">＋ 新增大主題</button>
    </div>
  </div>
</div>

<!-- ========== 設定 Modal ========== -->
<div class="backdrop" id="settingsBD">
  <div class="modal sm">
    <h2>⚙️ 設定</h2>
    <div class="fg">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="tokenInput" placeholder="github_pat_...">
      <div class="help">Token 存在本機，不外洩。<a href="https://github.com/settings/tokens?type=beta" target="_blank">前往建立 Token</a></div>
    </div>
    <div class="fg"><label>GitHub 用戶名</label><input id="ownerInput"></div>
    <div class="fg"><label>Repo 名稱</label><input id="repoInput"></div>
    <div class="fg"><label>資料檔</label><input id="pathInput" value="data.json"></div>
    <div class="fg"><label>分支</label><input id="branchInput" value="main"></div>
    <div class="modal-foot">
      <button class="danger sm" id="btnMgr">管理分類</button>
      <button class="danger sm" id="btnLogout">登出</button>
      <button class="ghost" id="btnSettingsClose">關閉</button>
      <button id="btnSettingsSave">儲存並重載</button>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ── Config ──────────────────────────────────────────────
const CFG_KEY='plib_cfg', TOK_KEY='plib_tok', LOCAL_KEY='plib_data_v3';
const DEF_CFG={owner:'monkey830526-byte',repo:'prompt-library',path:'data.json',branch:'main'};
const COLORS=['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899','#f97316','#84cc16','#6366f1'];
const DEF_CATS=[
  {id:'video',name:'影片',icon:'🎞️',color:'#8b5cf6',subs:[]},
  {id:'photo',name:'照片',icon:'📷',color:'#10b981',subs:[]}
];

const getCfg=()=>{try{return{...DEF_CFG,...JSON.parse(localStorage.getItem(CFG_KEY)||'{}')};}catch{return{...DEF_CFG};}};
const setCfg=c=>localStorage.setItem(CFG_KEY,JSON.stringify(c));
const getTok=()=>localStorage.getItem(TOK_KEY)||'';
const setTok=t=>t?localStorage.setItem(TOK_KEY,t):localStorage.removeItem(TOK_KEY);

// ── State ────────────────────────────────────────────────
let DB={categories:[],prompts:[]};
let sha=null;
let activMain='all', activSub='all';
let editPId=null, editCMode=null, editCId=null, editCParent=null;
let selColor=COLORS[0];
let saveTimer=null, saving=false;

const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=ts=>{if(!ts)return'';const d=new Date(ts);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};

// ── Toast ────────────────────────────────────────────────
function toast(msg,err=false){const t=$('toastEl');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.classList.remove('show'),2000);}

// ── Sync status ──────────────────────────────────────────
function setSync(txt,spin=false){$('syncEl').innerHTML=spin?`<span class="spin">⏳</span> ${txt}`:txt;}

// ── GitHub API ───────────────────────────────────────────
async function fetchDB(){
  const cfg=getCfg(),tok=getTok();
  setSync('載入中…',true);
  try{
    if(tok){
      const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`,
        {headers:{Authorization:`Bearer ${tok}`,Accept:'application/vnd.github+json'}});
      if(r.status===404){DB={categories:DEF_CATS.map(c=>({...c,subs:[...c.subs]})),prompts:[]};sha=null;setSync('（空白，尚未同步）');return;}
      if(!r.ok)throw new Error(`API ${r.status}`);
      const j=await r.json();sha=j.sha;
      DB=migrate(JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))))||'{}'));
    }else{
      const r=await fetch(`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/${cfg.path}?t=${Date.now()}`);
      if(!r.ok){if(r.status===404){DB={categories:DEF_CATS.map(c=>({...c,subs:[...c.subs]})),prompts:[]};setSync('（尚未有資料）');return;}throw new Error(r.status);}
      DB=migrate(await r.json());
    }
    setSync(`✓ 已同步 · ${DB.prompts.length} 筆`);
  }catch(e){
    console.error(e);setSync('⚠️ 載入失敗');toast('載入失敗：'+e.message,true);
    try{const l=localStorage.getItem(LOCAL_KEY);if(l){DB=JSON.parse(l);setSync('（離線模式）');}}catch{}
  }
}

function migrate(raw){
  // old: array
  if(Array.isArray(raw)) return{categories:DEF_CATS.map(c=>({...c,subs:[...c.subs]})),prompts:raw.map(p=>({...p,catId:p.type==='video'?'video':'photo',subId:''}))};
  // old v2: flat categories
  if(raw.categories&&raw.categories[0]&&!Array.isArray(raw.categories[0].subs)){
    const cats=DEF_CATS.map(c=>({...c,subs:[...c.subs]}));
    return{categories:cats,prompts:(raw.prompts||[]).map(p=>({...p,catId:p.catId||p.categoryId||'video',subId:''}))};
  }
  return{categories:(raw.categories&&raw.categories.length)?raw.categories:DEF_CATS.map(c=>({...c,subs:[...c.subs]})),prompts:raw.prompts||[]};
}

async function saveDB(){
  const cfg=getCfg(),tok=getTok();
  if(!tok){toast('未登入',true);return;}
  if(saving)return;
  saving=true;setSync('儲存中…',true);
  localStorage.setItem(LOCAL_KEY,JSON.stringify(DB));
  try{
    const body={message:`Update (${DB.prompts.length} prompts)`,content:btoa(unescape(encodeURIComponent(JSON.stringify(DB,null,2)))),branch:cfg.branch};
    if(sha)body.sha=sha;
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`,
      {method:'PUT',headers:{Authorization:`Bearer ${tok}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.status);}
    sha=(await r.json()).content.sha;
    setSync(`✓ 已同步 · ${DB.prompts.length} 筆`);
  }catch(e){console.error(e);setSync('⚠️ 儲存失敗');toast('儲存失敗：'+e.message,true);}
  finally{saving=false;}
}
function sched(){if(!getTok())return;clearTimeout(saveTimer);setSync('待儲存…');saveTimer=setTimeout(saveDB,1200);}

// ── Lookup helpers ───────────────────────────────────────
const getCat=id=>DB.categories.find(c=>c.id===id)||null;
const getSub=(catId,subId)=>getCat(catId)?.subs.find(s=>s.id===subId)||null;

// ── Render main tabs ─────────────────────────────────────
function renderMainTabs(){
  const wrap=$('mainTabs');
  // remove dynamic
  Array.from(wrap.children).forEach(el=>{if(el.dataset.dyn)el.remove();});
  const addBtn=$('btnAddMain');
  DB.categories.forEach(cat=>{
    const el=document.createElement('div');
    el.className='main-tab'+(activMain===cat.id?' active':'');
    el.dataset.main=cat.id; el.dataset.dyn='1';
    el.innerHTML=`${esc(cat.icon||'')} ${esc(cat.name)}`;
    el.onclick=()=>setMain(cat.id);
    wrap.insertBefore(el,addBtn);
  });
  wrap.querySelector('[data-main="all"]').className='main-tab'+(activMain==='all'?' active':'');
  wrap.querySelector('[data-main="fav"]').className='main-tab'+(activMain==='fav'?' active':'');
}

// ── Render sub tabs ──────────────────────────────────────
function renderSubTabs(){
  const wrap=$('subTabsWrap'), row=$('subTabs');
  const cat=getCat(activMain);
  if(!cat||activMain==='all'||activMain==='fav'){wrap.style.display='none';return;}
  wrap.style.display='block';
  row.innerHTML='';

  // "全部" sub
  const all=document.createElement('div');
  all.className='sub-tab'+(activSub==='all'?' active':'');
  if(activSub==='all') all.style.background=cat.color;
  all.textContent='全部';
  all.onclick=()=>setSub('all');
  row.appendChild(all);

  cat.subs.forEach(s=>{
    const el=document.createElement('div');
    el.className='sub-tab'+(activSub===s.id?' active':'');
    if(activSub===s.id) el.style.background=s.color||cat.color;
    el.innerHTML=`<span class="sub-tab-dot" style="background:${s.color||cat.color}"></span>${esc(s.icon||'')} ${esc(s.name)}`;
    el.onclick=()=>setSub(s.id);
    row.appendChild(el);
  });

  // add sub button (edit mode only)
  const addSub=document.createElement('div');
  addSub.className='sub-add-btn eo';
  addSub.textContent='＋ 新增小主題';
  addSub.onclick=()=>openCatModal('sub',null,activMain);
  row.appendChild(addSub);
  if(document.body.classList.contains('editmode')) addSub.style.display='flex';
}

function setMain(m){activMain=m;activSub='all';renderMainTabs();renderSubTabs();render();}
function setSub(s){activSub=s;renderSubTabs();render();}

// ── Render grid ──────────────────────────────────────────
function render(){
  const q=$('search').value.trim().toLowerCase();
  const sort=$('sortBy').value;
  let list=DB.prompts.slice();

  if(activMain==='fav') list=list.filter(p=>p.favorite);
  else if(activMain!=='all'){
    list=list.filter(p=>p.catId===activMain);
    if(activSub!=='all') list=list.filter(p=>p.subId===activSub);
  }

  if(q){
    list=list.filter(p=>{
      const cat=getCat(p.catId), sub=getSub(p.catId,p.subId);
      return(p.title||'').toLowerCase().includes(q)||
        (p.promptZh||'').toLowerCase().includes(q)||(p.promptEn||'').toLowerCase().includes(q)||
        (p.notes||'').toLowerCase().includes(q)||
        (p.tags||[]).some(t=>t.toLowerCase().includes(q))||
        (cat?.name||'').toLowerCase().includes(q)||(sub?.name||'').toLowerCase().includes(q);
    });
  }

  if(sort==='title') list.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  else if(sort==='created') list.sort((a,b)=>b.created-a.created);
  else list.sort((a,b)=>b.updated-a.updated);

  $('statsEl').textContent=`${list.length} / ${DB.prompts.length} 筆`;
  const grid=$('grid');
  grid.innerHTML='';
  $('emptyEl').style.display=list.length===0?'block':'none';

  list.forEach(p=>{
    const cat=getCat(p.catId), sub=getSub(p.catId,p.subId);
    const thumb=p.thumbnail
      ?`<img class="card-thumb" src="${esc(p.thumbnail)}" onerror="this.outerHTML='<div class=\\'card-thumb ph\\'>${esc(cat?.icon||'📄')}</div>'">`
      :`<div class="card-thumb ph">${esc(cat?.icon||'📄')}</div>`;
    const catBadge=cat?`<span class="badge-main" style="background:${cat.color}">${esc(cat.icon||'')} ${esc(cat.name)}</span>`:'';
    const subBadge=sub?`<span class="badge-sub" style="background:${sub.color||cat?.color||'#475569'}">${esc(sub.icon||'')} ${esc(sub.name)}</span>`:'';
    const favBadge=p.favorite?`<span class="fav-icon">⭐</span>`:'';
    const tags=(p.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      ${thumb}
      <div class="card-body">
        <div class="card-badges">${catBadge}${subBadge}${favBadge}</div>
        <div class="card-title">${esc(p.title||'未命名')}</div>
        ${p.promptZh?`<div class="prompt-box pzh">${esc(p.promptZh)}</div>`:''}
        ${p.promptEn?`<div class="prompt-box pen">${esc(p.promptEn)}</div>`:''}
        ${tags?`<div class="tags">${tags}</div>`:''}
        <div class="card-meta">更新 ${fmt(p.updated)}</div>
        <div class="card-actions">
          ${p.promptZh?`<button class="sm" data-cpzh="${p.id}">複製中文</button>`:''}
          ${p.promptEn?`<button class="sm ghost" data-cpen="${p.id}">複製英文</button>`:''}
          <button class="sm ghost eo" data-edit="${p.id}">編輯</button>
          <button class="sm ghost eo" data-fav="${p.id}">${p.favorite?'取消收藏':'收藏'}</button>
          <button class="sm danger eo" data-del="${p.id}">刪除</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── Prompt form helpers ──────────────────────────────────
function populateMainSel(selId){
  $('mainSel').innerHTML=DB.categories.map(c=>`<option value="${c.id}"${c.id===selId?' selected':''}>${esc(c.icon||'')} ${esc(c.name)}</option>`).join('');
  updateSubSel();
}
function updateSubSel(selId=''){
  const catId=$('mainSel').value;
  const cat=getCat(catId);
  const subs=cat?.subs||[];
  $('subSel').innerHTML=`<option value="">（無小主題）</option>`+subs.map(s=>`<option value="${s.id}"${s.id===selId?' selected':''}>${esc(s.icon||'')} ${esc(s.name)}</option>`).join('');
}
$('mainSel').onchange=()=>updateSubSel();

// ── Prompt modal ─────────────────────────────────────────
function openPromptModal(p=null){
  editPId=p?p.id:null;
  $('promptTitle').textContent=p?'編輯提詞':'新增提詞';
  $('promptForm').reset();
  const defCat=activMain!=='all'&&activMain!=='fav'?activMain:(DB.categories[0]?.id||'');
  populateMainSel(p?.catId||defCat);
  updateSubSel(p?.subId||'');
  resetImgUI(p?.thumbnail||'');
  if(p){
    $('promptForm').title.value=p.title||'';
    $('promptForm').promptZh.value=p.promptZh||'';
    $('promptForm').promptEn.value=p.promptEn||'';
    $('promptForm').tags.value=(p.tags||[]).join(', ');
    $('promptForm').notes.value=p.notes||'';
    $('promptForm').fav.checked=!!p.favorite;
  }
  $('promptBD').classList.add('open');
}
function closePromptModal(){$('promptBD').classList.remove('open');editPId=null;resetImgUI();}
$('btnPromptCancel').onclick=closePromptModal;
$('promptBD').onclick=e=>{if(e.target===$('promptBD'))closePromptModal();};
$('promptForm').onsubmit=async e=>{
  e.preventDefault();
  const fd=new FormData(e.target),now=Date.now();
  // upload image if pending
  let thumb=thumbInput.value||'';
  if(pendingImgB64){
    const uploaded=await uploadImgToGitHub();
    if(uploaded) thumb=uploaded;
    // if upload failed, keep base64 as fallback
  }
  const payload={catId:fd.get('catId'),subId:fd.get('subId')||'',title:fd.get('title'),
    thumbnail:thumb,promptZh:fd.get('promptZh'),promptEn:fd.get('promptEn'),
    tags:(fd.get('tags')||'').split(',').map(s=>s.trim()).filter(Boolean),
    notes:fd.get('notes'),favorite:fd.get('fav')==='on',updated:now};
  if(editPId){const i=DB.prompts.findIndex(p=>p.id===editPId);if(i>=0)DB.prompts[i]={...DB.prompts[i],...payload};}
  else DB.prompts.push({id:uid(),created:now,...payload});
  render();closePromptModal();sched();toast(editPId?'已更新':'已新增');
};

// ── Color picker ─────────────────────────────────────────
function renderColors(cur){
  selColor=cur||COLORS[0];
  $('colorPicker').innerHTML=COLORS.map(c=>`<div class="col-dot${c===selColor?' sel':''}" style="background:${c}" data-c="${c}"></div>`).join('');
  $('colorPicker').querySelectorAll('.col-dot').forEach(el=>el.onclick=()=>{selColor=el.dataset.c;renderColors(selColor);});
}

// ── Category modal ───────────────────────────────────────
// mode: 'main' | 'sub'
function openCatModal(mode,cat=null,parentId=null){
  editCMode=mode; editCId=cat?cat.id:null; editCParent=parentId;
  const isSub=mode==='sub';
  $('catTitle').textContent=cat?(isSub?'編輯小主題':'編輯大主題'):(isSub?'新增小主題':'新增大主題');
  $('catForm').reset();
  if(cat){$('catForm').name.value=cat.name;$('catForm').icon.value=cat.icon||'';}
  renderColors(cat?.color);
  $('catBD').classList.add('open');
}
function closeCatModal(){$('catBD').classList.remove('open');editCMode=editCId=editCParent=null;}
$('btnCatCancel').onclick=closeCatModal;
$('catBD').onclick=e=>{if(e.target===$('catBD'))closeCatModal();};
$('catForm').onsubmit=e=>{
  e.preventDefault();
  const fd=new FormData(e.target);
  const payload={name:fd.get('name'),icon:fd.get('icon')||'',color:selColor};
  if(editCMode==='main'){
    if(editCId){const i=DB.categories.findIndex(c=>c.id===editCId);if(i>=0)Object.assign(DB.categories[i],payload);}
    else DB.categories.push({id:uid(),subs:[],...payload});
  } else {
    const cat=getCat(editCParent);
    if(!cat)return;
    if(editCId){const i=cat.subs.findIndex(s=>s.id===editCId);if(i>=0)Object.assign(cat.subs[i],payload);}
    else cat.subs.push({id:uid(),...payload});
  }
  renderMainTabs();renderSubTabs();render();renderCatTree();
  closeCatModal();sched();toast(editCId?'已更新':'已新增');
};

// ── Category manager ─────────────────────────────────────
function openMgr(){renderCatTree();$('mgrBD').classList.add('open');}
function closeMgr(){$('mgrBD').classList.remove('open');}
function renderCatTree(){
  $('catTree').innerHTML=DB.categories.map(cat=>`
    <div class="cat-node">
      <div class="cat-node-head">
        <div class="cat-node-dot" style="background:${cat.color}"></div>
        <div class="cat-node-name">${esc(cat.icon||'')} ${esc(cat.name)}</div>
        <div class="cat-node-actions">
          <button class="sm ghost eo" data-emain="${cat.id}">編輯</button>
          <button class="sm danger eo" data-dmain="${cat.id}">刪除</button>
        </div>
      </div>
      <div class="subs-list">
        ${cat.subs.map(s=>`
          <div class="sub-item">
            <div class="sub-item-dot" style="background:${s.color||cat.color}"></div>
            <div class="sub-item-name">${esc(s.icon||'')} ${esc(s.name)}</div>
            <div class="sub-item-actions">
              <button class="sm ghost eo" data-esub="${s.id}" data-sparent="${cat.id}">編輯</button>
              <button class="sm danger eo" data-dsub="${s.id}" data-sparent="${cat.id}">刪除</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="add-sub-row eo" style="display:${document.body.classList.contains('editmode')?'block':'none'}">
        <button class="sm ghost" data-addsub="${cat.id}">＋ 新增小主題</button>
      </div>
    </div>`).join('');
}
$('catTree').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  if(b.dataset.emain){const c=getCat(b.dataset.emain);openCatModal('main',c);}
  else if(b.dataset.dmain){
    const c=getCat(b.dataset.dmain);
    const used=DB.prompts.filter(p=>p.catId===b.dataset.dmain).length;
    if(!confirm(`刪除大主題「${c?.name}」？${used?`\n（${used} 筆提詞會受影響）`:''}`))return;
    DB.categories=DB.categories.filter(c=>c.id!==b.dataset.dmain);
    if(activMain===b.dataset.dmain)activMain='all';
    renderMainTabs();renderSubTabs();render();renderCatTree();sched();toast('已刪除');
  } else if(b.dataset.esub){
    const s=getSub(b.dataset.sparent,b.dataset.esub);openCatModal('sub',s,b.dataset.sparent);
  } else if(b.dataset.dsub){
    const s=getSub(b.dataset.sparent,b.dataset.dsub);
    if(!confirm(`刪除小主題「${s?.name}」？`))return;
    const cat=getCat(b.dataset.sparent);if(!cat)return;
    cat.subs=cat.subs.filter(x=>x.id!==b.dataset.dsub);
    if(activSub===b.dataset.dsub)activSub='all';
    renderSubTabs();render();renderCatTree();sched();toast('已刪除');
  } else if(b.dataset.addsub){openCatModal('sub',null,b.dataset.addsub);}
});
$('btnMgrClose').onclick=closeMgr;$('mgrBD').onclick=e=>{if(e.target===$('mgrBD'))closeMgr();};
$('btnMgrAddMain').onclick=()=>openCatModal('main');

// ── Settings ─────────────────────────────────────────────
function openSettings(){
  const cfg=getCfg();
  $('tokenInput').value=getTok();
  $('ownerInput').value=cfg.owner;
  $('repoInput').value=cfg.repo;
  $('pathInput').value=cfg.path;
  $('branchInput').value=cfg.branch;
  $('settingsBD').classList.add('open');
}
function closeSettings(){$('settingsBD').classList.remove('open');}
$('btnSettings').onclick=openSettings;
$('btnSettingsClose').onclick=closeSettings;
$('settingsBD').onclick=e=>{if(e.target===$('settingsBD'))closeSettings();};
$('btnLogout').onclick=()=>{if(!confirm('登出？'))return;setTok('');updateMode();closeSettings();fetchDB().then(()=>{renderMainTabs();renderSubTabs();render();});toast('已登出');};
$('btnSettingsSave').onclick=async()=>{
  setTok($('tokenInput').value.trim());
  setCfg({owner:$('ownerInput').value.trim()||DEF_CFG.owner,repo:$('repoInput').value.trim()||DEF_CFG.repo,
    path:$('pathInput').value.trim()||'data.json',branch:$('branchInput').value.trim()||'main'});
  closeSettings();updateMode();await fetchDB();renderMainTabs();renderSubTabs();render();toast('設定已儲存');
};
$('btnMgr').onclick=()=>{closeSettings();openMgr();};

// ── Grid actions ─────────────────────────────────────────
$('grid').onclick=async e=>{
  const b=e.target.closest('button');if(!b)return;
  const id=b.dataset.cpzh||b.dataset.cpen||b.dataset.edit||b.dataset.del||b.dataset.fav;
  const p=DB.prompts.find(x=>x.id===id);if(!p)return;
  if(b.dataset.cpzh){await navigator.clipboard.writeText(p.promptZh||'');toast('已複製中文 Prompt');}
  else if(b.dataset.cpen){await navigator.clipboard.writeText(p.promptEn||'');toast('已複製英文 Prompt');}
  else if(b.dataset.edit)openPromptModal(p);
  else if(b.dataset.fav){p.favorite=!p.favorite;p.updated=Date.now();render();sched();}
  else if(b.dataset.del){if(confirm(`刪除「${p.title}」？`)){DB.prompts=DB.prompts.filter(x=>x.id!==id);render();sched();toast('已刪除');}}
};

// ── Static tab events ─────────────────────────────────────
$('mainTabs').querySelector('[data-main="all"]').onclick=()=>setMain('all');
$('mainTabs').querySelector('[data-main="fav"]').onclick=()=>setMain('fav');
$('btnAddMain').onclick=()=>openCatModal('main');
$('btnAdd').onclick=()=>openPromptModal();
$('search').oninput=render;
$('sortBy').onchange=render;
$('btnExport').onclick=()=>{
  const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=`prompts-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);toast('已匯出');
};

// ── Mode ──────────────────────────────────────────────────
function updateMode(){
  const has=!!getTok();
  document.body.classList.toggle('editmode',has);
  $('modeBadge').className='mode-badge '+(has?'edit':'read');
  $('modeBadge').textContent=has?'✏️ 可編輯':'👁️ 唯讀';
}

// ── Image Upload ─────────────────────────────────────────
const imgArea=$('imgUploadArea');
const thumbInput=$('thumbnailInput');
const thumbUrl=$('thumbUrlInput');
let pendingImgB64=null, pendingImgName=null;

function setImgPreview(src){
  // remove old img
  imgArea.querySelectorAll('img').forEach(e=>e.remove());
  imgArea.querySelector('.img-upload-icon').style.display=src?'none':'block';
  imgArea.querySelector('.img-upload-hint').style.display=src?'none':'block';
  if(src){const i=document.createElement('img');i.src=src;imgArea.insertBefore(i,imgArea.querySelector('.overlay'));}
}
function removeImg(){
  pendingImgB64=null; pendingImgName=null;
  thumbInput.value=''; thumbUrl.value='';
  setImgPreview(null);
}
thumbUrl.addEventListener('input',()=>{
  thumbInput.value=thumbUrl.value.trim();
  setImgPreview(thumbUrl.value.trim()||null);
  pendingImgB64=null;
});

async function handleImageFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const ext=file.name.split('.').pop()||'png';
  pendingImgName=`img_${Date.now()}.${ext}`;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImgB64=e.target.result.split(',')[1]; // base64 only
    setImgPreview(e.target.result);
    thumbInput.value=e.target.result; // temp preview
    thumbUrl.value='';
  };
  reader.readAsDataURL(file);
}

imgArea.onclick=()=>{
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>handleImageFile(e.target.files[0]);
  inp.click();
};

// Drag & drop
imgArea.addEventListener('dragover',e=>{e.preventDefault();imgArea.classList.add('drag');});
imgArea.addEventListener('dragleave',()=>imgArea.classList.remove('drag'));
imgArea.addEventListener('drop',e=>{
  e.preventDefault(); imgArea.classList.remove('drag');
  handleImageFile(e.dataTransfer.files[0]);
});

// Ctrl+V paste (global, active when prompt modal open)
document.addEventListener('paste',e=>{
  if(!$('promptBD').classList.contains('open')) return;
  const item=Array.from(e.clipboardData.items).find(i=>i.type.startsWith('image/'));
  if(item) handleImageFile(item.getAsFile());
});

async function uploadImgToGitHub(){
  if(!pendingImgB64||!pendingImgName) return null;
  const cfg=getCfg(), tok=getTok();
  if(!tok) return null; // no token → keep base64
  $('imgUploadStatus').style.display='inline';
  try{
    const path=`images/${pendingImgName}`;
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`,{
      method:'PUT',
      headers:{Authorization:`Bearer ${tok}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`Add image ${pendingImgName}`,content:pendingImgB64,branch:cfg.branch})
    });
    if(!r.ok) throw new Error('上傳失敗');
    const url=`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/${path}`;
    pendingImgB64=null; pendingImgName=null;
    return url;
  }catch(e){console.error(e);toast('圖片上傳失敗，改用本地預覽',true);return null;}
  finally{$('imgUploadStatus').style.display='none';}
}

function resetImgUI(url=''){
  thumbInput.value=url||'';
  thumbUrl.value=url&&!url.startsWith('data:')?url:'';
  setImgPreview(url||null);
  pendingImgB64=null; pendingImgName=null;
}

// ── Init ──────────────────────────────────────────────────
updateMode();
fetchDB().then(()=>{renderMainTabs();renderSubTabs();render();});
</script>
