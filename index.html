<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提詞庫 Prompt Library</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 { font-size: 24px; color: #f1f5f9; display: flex; align-items: center; gap: 10px; }
  .mode-badge {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: normal;
  }
  .mode-badge.read { background: #334155; color: #94a3b8; }
  .mode-badge.edit { background: #10b981; color: white; }
  .sync-status {
    font-size: 12px;
    color: #94a3b8;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 8px 16px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    cursor: pointer;
    color: #cbd5e1;
    font-size: 14px;
    transition: all 0.15s;
  }
  .tab:hover { background: #334155; }
  .tab.active { background: #3b82f6; border-color: #3b82f6; color: white; }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  input, textarea, select {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e2e8f0;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #3b82f6;
  }
  .search { flex: 1; min-width: 200px; }
  button {
    background: #3b82f6;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }
  button:hover { background: #2563eb; }
  button.ghost { background: #334155; }
  button.ghost:hover { background: #475569; }
  button.danger { background: #ef4444; }
  button.danger:hover { background: #dc2626; }
  button.small { padding: 6px 10px; font-size: 12px; }
  button.icon {
    padding: 8px 10px;
    background: transparent;
    border: 1px solid #334155;
  }
  button.icon:hover { background: #334155; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card-thumb {
    width: 100%;
    height: 180px;
    background: #0f172a;
    object-fit: cover;
    display: block;
  }
  .card-thumb.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: #475569;
  }
  .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-title { font-size: 16px; font-weight: 600; color: #f1f5f9; }
  .card-meta { font-size: 12px; color: #94a3b8; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    background: #0ea5e9;
    color: white;
    border-radius: 4px;
    font-size: 11px;
    margin-right: 4px;
  }
  .badge.video { background: #8b5cf6; }
  .badge.photo { background: #10b981; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    background: #334155;
    color: #cbd5e1;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }
  .prompt-text {
    background: #0f172a;
    padding: 8px;
    border-radius: 6px;
    font-size: 12px;
    color: #cbd5e1;
    max-height: 60px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card-actions { display: flex; gap: 6px; margin-top: auto; flex-wrap: wrap; }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: #1e293b;
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #94a3b8;
  }
  .form-group input,
  .form-group textarea,
  .form-group select { width: 100%; }
  .form-group textarea { min-height: 80px; resize: vertical; font-family: inherit; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #10b981;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #ef4444; }
  .stats { font-size: 13px; color: #94a3b8; }
  .help-text {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 4px;
    line-height: 1.5;
  }
  .help-text a { color: #60a5fa; }
  .edit-only { display: none; }
  body.edit-mode .edit-only { display: inline-flex; }
  body.edit-mode .card-actions .edit-only { display: inline-block; }
  .spin {
    display: inline-block;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>
      🎬 提詞庫
      <span class="mode-badge read" id="modeBadge">唯讀</span>
    </h1>
    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
      <span class="sync-status" id="syncStatus"></span>
      <button class="edit-only" id="btnAdd">+ 新增</button>
      <button class="ghost edit-only" id="btnExport">匯出</button>
      <button class="icon" id="btnSettings" title="設定">⚙️</button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" data-type="all">全部</div>
    <div class="tab" data-type="video">🎞️ 影片</div>
    <div class="tab" data-type="photo">📷 照片</div>
    <div class="tab" data-type="favorite">⭐ 收藏</div>
  </div>

  <div class="toolbar">
    <input type="text" class="search" id="search" placeholder="搜尋標題 / prompt / 標籤…">
    <select id="sortBy">
      <option value="updated">最近更新</option>
      <option value="created">建立時間</option>
      <option value="title">標題 A-Z</option>
    </select>
    <span class="stats" id="stats"></span>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">
    <div class="empty-icon">📭</div>
    <div>目前沒有提詞</div>
  </div>
</div>

<!-- 新增 / 編輯提詞 Modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2 id="modalTitle">新增提詞</h2>
    <form id="form">
      <div class="form-group">
        <label>類型</label>
        <select name="type" required>
          <option value="video">🎞️ 影片</option>
          <option value="photo">📷 照片</option>
        </select>
      </div>
      <div class="form-group">
        <label>標題</label>
        <input name="title" required placeholder="例：電影感日落街景">
      </div>
      <div class="form-group">
        <label>縮圖網址（選填）</label>
        <input name="thumbnail" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>中文 Prompt</label>
        <textarea name="promptZh" placeholder="用中文描述你想要的畫面"></textarea>
      </div>
      <div class="form-group">
        <label>英文 Prompt（給 API 用）</label>
        <textarea name="promptEn" placeholder="English prompt for API"></textarea>
      </div>
      <div class="form-group">
        <label>標籤（用逗號分隔）</label>
        <input name="tags" placeholder="電影感, 夕陽, 街景">
      </div>
      <div class="form-group">
        <label>備註 / 參數</label>
        <textarea name="notes" placeholder="例：ratio 16:9, duration 5s"></textarea>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" name="favorite" style="width:auto; margin-right:6px;">
          加入收藏
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" class="ghost" id="btnCancel">取消</button>
        <button type="submit">儲存</button>
      </div>
    </form>
  </div>
</div>

<!-- 設定 Modal -->
<div class="modal-backdrop" id="settingsModal">
  <div class="modal">
    <h2>⚙️ 設定</h2>
    <div class="form-group">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="tokenInput" placeholder="ghp_... 或 github_pat_...">
      <div class="help-text">
        只有擁有 Token 的人才能編輯。Token 會儲存在這台瀏覽器的 localStorage，不會外洩。<br>
        不知道怎麼建立？<a href="https://github.com/settings/tokens?type=beta" target="_blank">點此前往 GitHub 建立</a>
      </div>
    </div>
    <div class="form-group">
      <label>GitHub 用戶名</label>
      <input id="ownerInput" placeholder="monkey830526-byte">
    </div>
    <div class="form-group">
      <label>Repo 名稱</label>
      <input id="repoInput" placeholder="prompt-library">
    </div>
    <div class="form-group">
      <label>資料檔路徑</label>
      <input id="pathInput" placeholder="data.json" value="data.json">
    </div>
    <div class="form-group">
      <label>分支</label>
      <input id="branchInput" placeholder="main" value="main">
    </div>
    <div class="modal-actions">
      <button type="button" class="danger" id="btnClearToken">清除 Token（登出）</button>
      <button type="button" class="ghost" id="btnCloseSettings">關閉</button>
      <button type="button" id="btnSaveSettings">儲存並重新載入</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ 設定 ============
const DEFAULT_CONFIG = {
  owner: 'monkey830526-byte',
  repo: 'prompt-library',
  path: 'data.json',
  branch: 'main',
};
const CONFIG_KEY = 'prompt_library_config';
const TOKEN_KEY = 'prompt_library_token';

function getConfig() {
  try {
    return { ...DEFAULT_CONFIG, ...JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}') };
  } catch { return { ...DEFAULT_CONFIG }; }
}
function setConfig(cfg) {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
}
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) {
  if (t) localStorage.setItem(TOKEN_KEY, t);
  else localStorage.removeItem(TOKEN_KEY);
}

// ============ 狀態 ============
let items = [];
let fileSha = null;
let editingId = null;
let activeType = 'all';
let saveTimer = null;
let saving = false;

const $ = id => document.getElementById(id);

// ============ UI 輔助 ============
function toast(msg, isError = false) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function setSyncStatus(text, spin = false) {
  $('syncStatus').innerHTML = spin ? `<span class="spin">⏳</span> ${text}` : text;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }
function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ============ GitHub API ============
async function fetchData() {
  const cfg = getConfig();
  const token = getToken();
  setSyncStatus('載入中…', true);
  try {
    // 有 token 時用 API（可拿到 sha 以便寫入）；沒 token 時用 raw URL（公開讀取）
    if (token) {
      const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }});
      if (res.status === 404) { items = []; fileSha = null; setSyncStatus('（新檔案，尚未建立）'); return; }
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const json = await res.json();
      fileSha = json.sha;
      const content = decodeURIComponent(escape(atob(json.content.replace(/\n/g, ''))));
      items = JSON.parse(content || '[]');
    } else {
      const url = `https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch}/${cfg.path}?t=${Date.now()}`;
      const res = await fetch(url);
      if (!res.ok) {
        if (res.status === 404) { items = []; setSyncStatus('（尚未有資料）'); return; }
        throw new Error(`讀取失敗 ${res.status}`);
      }
      items = await res.json();
    }
    setSyncStatus(`✓ 已同步 · ${items.length} 筆`);
  } catch (err) {
    console.error(err);
    setSyncStatus('⚠️ 讀取失敗：' + err.message);
    toast('讀取失敗：' + err.message, true);
    items = [];
  }
}

async function saveData() {
  const cfg = getConfig();
  const token = getToken();
  if (!token) { toast('未登入，無法儲存', true); return; }
  if (saving) return;
  saving = true;
  setSyncStatus('儲存中…', true);
  try {
    const content = JSON.stringify(items, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(content)));
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
    const body = {
      message: `Update prompt library (${items.length} items)`,
      content: encoded,
      branch: cfg.branch,
    };
    if (fileSha) body.sha = fileSha;
    const res = await fetch(url, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const errJson = await res.json().catch(() => ({}));
      throw new Error(errJson.message || `GitHub API ${res.status}`);
    }
    const json = await res.json();
    fileSha = json.content.sha;
    setSyncStatus(`✓ 已同步 · ${items.length} 筆`);
  } catch (err) {
    console.error(err);
    setSyncStatus('⚠️ 儲存失敗：' + err.message);
    toast('儲存失敗：' + err.message, true);
  } finally {
    saving = false;
  }
}

function scheduleSave() {
  if (!getToken()) return;
  clearTimeout(saveTimer);
  setSyncStatus('待儲存…');
  saveTimer = setTimeout(saveData, 1200);
}

// ============ 渲染 ============
function render() {
  const q = $('search').value.trim().toLowerCase();
  const sortBy = $('sortBy').value;
  let list = items.slice();

  if (activeType === 'favorite') list = list.filter(i => i.favorite);
  else if (activeType !== 'all') list = list.filter(i => i.type === activeType);

  if (q) {
    list = list.filter(i =>
      (i.title || '').toLowerCase().includes(q) ||
      (i.promptZh || '').toLowerCase().includes(q) ||
      (i.promptEn || '').toLowerCase().includes(q) ||
      (i.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  if (sortBy === 'title') list.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
  else if (sortBy === 'created') list.sort((a, b) => b.created - a.created);
  else list.sort((a, b) => b.updated - a.updated);

  $('stats').textContent = `顯示 ${list.length} 筆 / 共 ${items.length}`;

  const grid = $('grid');
  grid.innerHTML = '';
  $('empty').style.display = list.length === 0 ? 'block' : 'none';

  for (const item of list) {
    const card = document.createElement('div');
    card.className = 'card';
    const typeBadge = item.type === 'video' ? '<span class="badge video">🎞️ 影片</span>' : '<span class="badge photo">📷 照片</span>';
    const favBadge = item.favorite ? '<span class="badge" style="background:#f59e0b;">⭐</span>' : '';
    const tagsHtml = (item.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
    const thumb = item.thumbnail
      ? `<img class="card-thumb" src="${escapeAttr(item.thumbnail)}" onerror="this.outerHTML='<div class=\\'card-thumb placeholder\\'>${item.type === 'video' ? '🎞️' : '📷'}</div>'">`
      : `<div class="card-thumb placeholder">${item.type === 'video' ? '🎞️' : '📷'}</div>`;

    card.innerHTML = `
      ${thumb}
      <div class="card-body">
        <div>${typeBadge}${favBadge}</div>
        <div class="card-title">${escapeHtml(item.title || '未命名')}</div>
        ${item.promptZh ? `<div class="prompt-text">${escapeHtml(item.promptZh)}</div>` : ''}
        ${item.promptEn ? `<div class="prompt-text" style="color:#7dd3fc;">${escapeHtml(item.promptEn)}</div>` : ''}
        <div class="tags">${tagsHtml}</div>
        <div class="card-meta">更新於 ${formatDate(item.updated)}</div>
        <div class="card-actions">
          ${item.promptZh ? `<button class="small" data-copy-zh="${item.id}">複製中文</button>` : ''}
          ${item.promptEn ? `<button class="small" data-copy-en="${item.id}">複製英文</button>` : ''}
          <button class="small ghost edit-only" data-edit="${item.id}">編輯</button>
          <button class="small ghost edit-only" data-fav="${item.id}">${item.favorite ? '取消收藏' : '收藏'}</button>
          <button class="small danger edit-only" data-del="${item.id}">刪除</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  }
}

// ============ 提詞 Modal ============
function openModal(item) {
  editingId = item ? item.id : null;
  $('modalTitle').textContent = item ? '編輯提詞' : '新增提詞';
  const f = $('form');
  f.reset();
  if (item) {
    f.type.value = item.type || 'video';
    f.title.value = item.title || '';
    f.thumbnail.value = item.thumbnail || '';
    f.promptZh.value = item.promptZh || '';
    f.promptEn.value = item.promptEn || '';
    f.tags.value = (item.tags || []).join(', ');
    f.notes.value = item.notes || '';
    f.favorite.checked = !!item.favorite;
  }
  $('modal').classList.add('active');
}
function closeModal() {
  $('modal').classList.remove('active');
  editingId = null;
}

// ============ 設定 Modal ============
function openSettings() {
  const cfg = getConfig();
  $('tokenInput').value = getToken();
  $('ownerInput').value = cfg.owner;
  $('repoInput').value = cfg.repo;
  $('pathInput').value = cfg.path;
  $('branchInput').value = cfg.branch;
  $('settingsModal').classList.add('active');
}
function closeSettings() {
  $('settingsModal').classList.remove('active');
}

// ============ 模式切換 ============
function updateMode() {
  const hasToken = !!getToken();
  document.body.classList.toggle('edit-mode', hasToken);
  $('modeBadge').className = 'mode-badge ' + (hasToken ? 'edit' : 'read');
  $('modeBadge').textContent = hasToken ? '✏️ 可編輯' : '👁️ 唯讀';
}

// ============ 事件 ============
$('btnAdd').onclick = () => openModal(null);
$('btnCancel').onclick = closeModal;
$('modal').onclick = e => { if (e.target === $('modal')) closeModal(); };

$('btnSettings').onclick = openSettings;
$('btnCloseSettings').onclick = closeSettings;
$('settingsModal').onclick = e => { if (e.target === $('settingsModal')) closeSettings(); };
$('btnClearToken').onclick = () => {
  if (confirm('清除 Token 後將變成唯讀模式，確定？')) {
    setToken('');
    updateMode();
    closeSettings();
    toast('已登出');
    fetchData().then(render);
  }
};
$('btnSaveSettings').onclick = async () => {
  setToken($('tokenInput').value.trim());
  setConfig({
    owner: $('ownerInput').value.trim() || DEFAULT_CONFIG.owner,
    repo: $('repoInput').value.trim() || DEFAULT_CONFIG.repo,
    path: $('pathInput').value.trim() || 'data.json',
    branch: $('branchInput').value.trim() || 'main',
  });
  closeSettings();
  updateMode();
  await fetchData();
  render();
  toast('設定已儲存');
};

$('form').onsubmit = e => {
  e.preventDefault();
  const data = new FormData(e.target);
  const now = Date.now();
  const tags = (data.get('tags') || '').split(',').map(s => s.trim()).filter(Boolean);
  const payload = {
    type: data.get('type'),
    title: data.get('title'),
    thumbnail: data.get('thumbnail'),
    promptZh: data.get('promptZh'),
    promptEn: data.get('promptEn'),
    tags,
    notes: data.get('notes'),
    favorite: data.get('favorite') === 'on',
    updated: now,
  };
  if (editingId) {
    const i = items.findIndex(x => x.id === editingId);
    if (i >= 0) items[i] = { ...items[i], ...payload };
  } else {
    items.push({ id: uid(), created: now, ...payload });
  }
  render();
  closeModal();
  scheduleSave();
  toast(editingId ? '已更新' : '已新增');
};

$('search').oninput = render;
$('sortBy').onchange = render;

$('tabs').onclick = e => {
  const t = e.target.closest('.tab');
  if (!t) return;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  activeType = t.dataset.type;
  render();
};

$('grid').onclick = async e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const id = btn.dataset.copyZh || btn.dataset.copyEn || btn.dataset.edit || btn.dataset.del || btn.dataset.fav;
  const item = items.find(x => x.id === id);
  if (!item) return;

  if (btn.dataset.copyZh) {
    await navigator.clipboard.writeText(item.promptZh || '');
    toast('已複製中文 Prompt');
  } else if (btn.dataset.copyEn) {
    await navigator.clipboard.writeText(item.promptEn || '');
    toast('已複製英文 Prompt');
  } else if (btn.dataset.edit) {
    openModal(item);
  } else if (btn.dataset.fav) {
    item.favorite = !item.favorite;
    item.updated = Date.now();
    render();
    scheduleSave();
  } else if (btn.dataset.del) {
    if (confirm(`確定刪除「${item.title}」？`)) {
      items = items.filter(x => x.id !== id);
      render();
      scheduleSave();
      toast('已刪除');
    }
  }
};

$('btnExport').onclick = () => {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `prompt-library-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('已匯出');
};

// ============ 啟動 ============
updateMode();
fetchData().then(render);
</script>
</body>
</html>
